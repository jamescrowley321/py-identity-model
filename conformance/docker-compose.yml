services:
  mongodb:
    image: mongo:6.0.13
    volumes:
      - mongodb-data:/data/db

  nginx:
    build:
      context: ./nginx
    ports:
      - "8443:8443"
    networks:
      default:
        aliases:
          - localhost.emobix.co.uk
    volumes:
      - nginx-certs:/etc/ssl/certs
    depends_on:
      server:
        condition: service_healthy

  server:
    image: authelia/openid-connect-conformance-suite:latest
    environment:
      - JAVA_EXTRA_ARGS=-Dspring.data.mongodb.uri=mongodb://mongodb:27017/test_suite -Dfintechlabs.devmode=true -Dfintechlabs.startredir=false -Dfintechlabs.base_url=https://localhost.emobix.co.uk:8443
      - CONFORMANCE_SERVER_BASE_URL=https://localhost.emobix.co.uk:8443
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITLAB_CLIENT_ID=dummy
      - SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GITLAB_CLIENT_SECRET=dummy
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  rp:
    build:
      context: ..
      dockerfile: conformance/Dockerfile
    ports:
      - "8888:8888"
    environment:
      - RP_HOST=0.0.0.0
      - RP_PORT=8888
      - CONFORMANCE_SUITE_BASE_URL=https://localhost.emobix.co.uk:8443
      # The library's default HTTP client uses verify=True (system CA).
      # For local conformance runs against the self-signed nginx cert,
      # SSL_CERT_FILE must point to the nginx cert so validate_token's
      # JWKS/discovery fetches succeed. See PR #335 for the full context.
      - SSL_CERT_FILE=/etc/ssl/nginx-certs/nginx-selfsigned.crt
    volumes:
      - nginx-certs:/etc/ssl/nginx-certs:ro
    depends_on:
      server:
        condition: service_healthy

volumes:
  mongodb-data:
  nginx-certs:
