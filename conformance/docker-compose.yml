services:
  cert-init:
    image: alpine:3.20
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        [ -f /certs/nginx-selfsigned.crt ] && exit 0
        apk add --no-cache openssl &&
        openssl req -x509 -nodes -days 30 -newkey rsa:2048 \
          -keyout /certs/nginx-selfsigned.key \
          -out /certs/nginx-selfsigned.crt \
          -subj "/CN=localhost.emobix.co.uk" \
          -addext "subjectAltName=DNS:localhost.emobix.co.uk"
    volumes:
      - certs:/certs

  mongodb:
    image: mongo:6.0.13
    volumes:
      - mongodb-data:/data/db

  nginx:
    build:
      context: ./nginx
    ports:
      - "8443:8443"
    networks:
      default:
        aliases:
          - localhost.emobix.co.uk
    volumes:
      - certs:/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      server:
        condition: service_healthy

  server:
    image: registry.gitlab.com/openid/conformance-suite:latest
    environment:
      - BASE_URL=https://localhost.emobix.co.uk:8443
      - MONGODB_HOST=mongodb
      - SPRING_PROFILES_ACTIVE=dev
      - OIDC_GOOGLE_CLIENTID=dummy
      - OIDC_GOOGLE_SECRET=dummy
      - OIDC_GITLAB_CLIENTID=dummy
      - OIDC_GITLAB_SECRET=dummy
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null http://localhost:8080/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  rp:
    build:
      context: ..
      dockerfile: conformance/Dockerfile
    ports:
      - "8888:8888"
    environment:
      - RP_HOST=0.0.0.0
      - RP_PORT=8888
      - CONFORMANCE_SUITE_BASE_URL=https://localhost.emobix.co.uk:8443
      - SSL_CERT_FILE=/certs/nginx-selfsigned.crt
    volumes:
      - certs:/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      nginx:
        condition: service_started
      server:
        condition: service_healthy

  # Same suite, second RP: the fastapi-identity-model package's real
  # build_oidc_router driven through the identical plans (regression stage).
  rp-fastapi:
    build:
      context: ..
      dockerfile: conformance/Dockerfile.fastapi
    ports:
      - "8889:8889"
    environment:
      - RP_BASE_URL=http://localhost:8889
      - CONFORMANCE_SUITE_BASE_URL=https://localhost.emobix.co.uk:8443
      - SSL_CERT_FILE=/certs/nginx-selfsigned.crt
    volumes:
      - certs:/certs:ro
    depends_on:
      cert-init:
        condition: service_completed_successfully
      nginx:
        condition: service_started
      server:
        condition: service_healthy

volumes:
  mongodb-data:
  certs:
