[tool.uv.workspace]
members = [".", "examples/fastapi", "examples/descope"]

[project]
name = "py-identity-model"
version = "2.18.1"
description = "OAuth2.0 and OpenID Connect Client Library"
authors = [{ name = "jamescrowley321", email = "jamescrowley151@gmail.com" }]
requires-python = ">=3.12"
readme = "README.md"
classifiers = [
    "License :: OSI Approved :: Apache Software License",
]
dependencies = [
    "PyJWT>=2.9.0,<3",
    "httpx>=0.28.1,<1",
    "cryptography>=45.0.2,<47",
    "async-lru>=2.0.4,<3",
]

[dependency-groups]
dev = [
    "filelock>=3.16.1,<4",
    "pre-commit>=3.8.0,<5",
    "python-dotenv>=1.0.1,<2",
    "pytest>=8.3.2,<10",
    "pytest-asyncio>=0.24.0",
    "pytest-benchmark>=5.1.0,<6",
    "pytest-cov>=6.0.0,<8",
    "pytest-xdist>=3.6.1,<4",
    "respx>=0.21.0",
    "pytest-timeout>=2.3.1",
    "ruff>=0.11.12",
    "pyrefly>=0.34.0",
    "tenacity>=9.0.0,<10",
]
docs = [
    "mkdocs>=1.6.0,<2",
    "mkdocs-material>=9.6.0,<10",
    "mkdocstrings[python]>=0.29.0,<1",
]

[build-system]
requires = ["uv_build>=0.6,<0.11"]
build-backend = "uv_build"

[tool.semantic_release]
assets = []
commit_message = "{version}\n\nAutomatically generated by python-semantic-release"
commit_parser = "angular"
logging_use_named_masks = false
major_on_zero = true
tag_format = "{version}"
build_command = "echo 1"
version_toml = [
    "pyproject.toml:project.version",
]
commit_version_number = true

[tool.semantic_release.branches.main]
match = "main"

[tool.semantic_release.branches.other]
match = ".*"
prerelease_token = "rc"
prerelease = true

[tool.semantic_release.changelog]
changelog_file = "CHANGELOG.md"
exclude_commit_patterns = []

[tool.semantic_release.changelog.environment]
block_start_string = "{%"
block_end_string = "%}"
variable_start_string = "{{"
variable_end_string = "}}"
comment_start_string = "{#"
comment_end_string = "#}"
trim_blocks = false
lstrip_blocks = false
newline_sequence = "\n"
keep_trailing_newline = false
extensions = []
autoescape = true

[tool.semantic_release.commit_author]
env = "GIT_COMMIT_AUTHOR"
default = "semantic-release <semantic-release>"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
name = "origin"
type = "github"
ignore_token_for_push = false

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

[tool.pyrefly]
project_excludes = [
    "examples/fastapi/",
    "examples/descope/",
    "conformance/",
]

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = [
    "B",    # flake8-bugbear
    "C",    # mccabe complexity
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "W",    # pycodestyle warnings
    "I",    # isort
    "UP",   # pyupgrade — modernize Python code
    "S",    # flake8-bandit — security checks
    "A",    # flake8-builtins — check for shadowing builtins
    # COM removed — trailing commas managed by ruff format (skip-magic-trailing-comma = false).
    # COM812 is a documented formatter conflict: https://docs.astral.sh/ruff/formatter/#conflicting-lint-rules
    "DTZ",  # flake8-datetimez — datetime timezone awareness
    "ICN",  # flake8-import-conventions — import naming conventions
    "PIE",  # flake8-pie — misc lints
    "PT",   # flake8-pytest-style — pytest best practices
    "Q",    # flake8-quotes — quote consistency
    "RSE",  # flake8-raise — exception raise improvements
    "RET",  # flake8-return — return statement improvements
    "SIM",  # flake8-simplify — code simplification suggestions
    "TCH",  # flake8-type-checking — optimize type checking imports
    "ARG",  # flake8-unused-arguments — unused function arguments
    "PTH",  # flake8-use-pathlib — prefer pathlib over os.path
    "ERA",  # eradicate — find commented out code
    "PL",   # pylint
    "PERF", # perflint — performance anti-patterns
    "RUF",  # ruff-specific rules
]
ignore = [
    # Formatter conflict — ruff format (line-length 88) produces lines the linter flags.
    # 129 violations after reformat: 45 OIDC spec comments in jwt_claim_types.py,
    # remainder are long strings/imports the formatter cannot break further.
    "E501",
    # OIDC protocol naming — variables/args named *_token, *_secret, *_password
    # are RFC 6749/7519/8693 field names, not actual secrets.
    # Per-file-ignores not viable: 70 S105 violations are in production code
    # (oidc_constants.py, token_type.py) defining RFC parameter name constants.
    "S105",  # 119 violations — all OIDC protocol constants (RFC 6749 §1.4/§1.5, RFC 8693 §2.1)
    "S106",  # 292 violations — 9 prod (token_part args in JWT parsers), 283 test/example fixtures
]

[tool.ruff.lint.per-file-ignores]
"src/tests/**/*.py" = ["S101"]   # 1858 assert violations — all test assertions, 0 in production code
"examples/**/*.py" = ["S101"]    # 73 assert violations in example integration tests
"conformance/tests/**/*.py" = ["S101"]  # conformance harness unit tests — assert is the standard pytest assertion mechanism
"conformance/**/*.py" = [
    "S501",    # verify=False required — conformance suite uses self-signed certs
    "PLR0911", # callback handler has many early-return error paths
    "PLR0912", # callback handler has many branches (one per validation step)
    "PLR0913", # functions accept many params from conformance suite API
    "PLR0915", # callback handler is long but linear (one OIDC flow)
    "PLW0603", # global for singleton HTTP client
    "ARG001",  # unused args kept for API compatibility
]

[tool.ruff.lint.isort]
known-first-party = ["py_identity_model"]
force-sort-within-sections = true
lines-after-imports = 2

[tool.ruff.lint.mccabe]
max-complexity = 18

[tool.ruff.lint.pyupgrade]
# Keep runtime type checking for Python 3.12+
keep-runtime-typing = true

[tool.ruff.lint.flake8-pytest-style]
fixture-parentheses = false
mark-parentheses = false

[tool.ruff.lint.flake8-quotes]
inline-quotes = "double"

[tool.ruff.format]
# Use double quotes for strings
quote-style = "double"
# Indent with spaces
indent-style = "space"
# Respect magic trailing comma
skip-magic-trailing-comma = false
# Auto-detect line ending
line-ending = "auto"
# Format docstrings
docstring-code-format = true

[tool.pytest.ini_options]
# Test discovery
testpaths = ["src/tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
# Output options
addopts = [
    "-ra", # show extra test summary info for all except passed
    "--strict-markers", # raise error on unknown markers
    "--strict-config", # raise error on config issues
    "--showlocals", # show local variables in tracebacks
    "-vv", # very verbose
    "--tb=short", # shorter tracebacks
    "--no-header", # skip pytest header info
    "--disable-warnings", # hide warnings in output for cleaner results
]
# Markers for test categorization
markers = [
    "integration: marks tests as integration tests (deselect with '-m \"not integration\"')",
    "unit: marks tests as unit tests",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "benchmark: marks tests as performance benchmarks",
]
# Async test configuration
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
# Filter warnings
filterwarnings = [
    "error", # treat warnings as errors
    "ignore::DeprecationWarning",
    "ignore::PendingDeprecationWarning",
]

[tool.coverage.run]
source = ["src/py_identity_model"]
branch = true
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "*/oidc_constants.py",  # Constants file - no logic to test
    "*/__init__.py",  # Import-only files - no logic to test
]

[tool.coverage.report]
precision = 2
show_missing = true
skip_covered = false
fail_under = 80.0
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]
