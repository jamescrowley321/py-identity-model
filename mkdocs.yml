site_name: py-identity-model
site_description: OAuth2.0 and OpenID Connect Client Library
site_author: James Crowley
site_url: https://jamescrowley321.github.io/py-identity-model

repo_name: jamescrowley321/py-identity-model
repo_url: https://github.com/jamescrowley321/py-identity-model

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            show_bases: true
            show_inheritance_diagram: false
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false
            signature_crossrefs: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jamescrowley321/py-identity-model

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Migration Guide: migration-guide.md
      - Performance: performance.md
      - Pre-release Guide: pre-release-guide.md
      - Troubleshooting: troubleshooting.md
      - FAQ: faq.md
      - Contributing: contributing.md
  - Specifications:
      - Discovery Compliance: discovery_specification_compliance_assessment.md
      - JWKS Compliance: jwks_specification_compliance_assessment.md
  - API Reference:
      - Overview: api/index.md
      - Discovery: api/discovery.md
      - JWKS: api/jwks.md
      - Token Client: api/token-client.md
      - Token Validation: api/token-validation.md
      - UserInfo: api/userinfo.md
      - Identity & Claims: api/identity.md
      - Exceptions: api/exceptions.md
  - Roadmap: py_identity_model_roadmap.md
  - Examples:
      - Identity Server: identity-server-example.md
  - Testing:
      - Integration Tests: integration-tests.md
  - Changelog: changelog.md
