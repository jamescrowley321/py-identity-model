[project]
name = "fastapi-identity-model"
version = "0.1.0"
description = "FastAPI OIDC/OAuth2 middleware and relying-party router, built on py-identity-model"
authors = [{ name = "jamescrowley321", email = "jamescrowley151@gmail.com" }]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "fastapi",
    "oauth2",
    "oidc",
    "openid-connect",
    "authentication",
    "jwt",
    "middleware",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "py-identity-model>=3.1.0",
    # fastapi floor aligned with starlette>=0.49.1: fastapi 0.100 pins an old
    # starlette (~0.27) and cannot satisfy the starlette floor below.
    "fastapi>=0.115.0",
    "starlette>=0.49.1",
    "itsdangerous>=2.0",
]

[project.optional-dependencies]
# Convenience extra for running the demo app / a real server.
server = ["uvicorn[standard]>=0.23.0"]

[project.urls]
Homepage = "https://github.com/jamescrowley321/py-identity-model"
Repository = "https://github.com/jamescrowley321/py-identity-model"
Issues = "https://github.com/jamescrowley321/py-identity-model/issues"

[tool.uv.sources]
py-identity-model = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["fastapi_identity_model"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
