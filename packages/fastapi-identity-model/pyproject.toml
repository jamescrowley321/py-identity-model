[project]
name = "fastapi-identity-model"
version = "0.1.0"
description = "FastAPI OIDC/OAuth2 middleware and relying-party router, built on py-identity-model"
authors = [{ name = "jamescrowley321", email = "jamescrowley151@gmail.com" }]
requires-python = ">=3.12"
readme = "README.md"
license = "Apache-2.0"
keywords = [
    "fastapi",
    "oauth2",
    "oidc",
    "openid-connect",
    "authentication",
    "jwt",
    "middleware",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Framework :: FastAPI",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Security",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Typing :: Typed",
]
dependencies = [
    "py-identity-model>=3.1.0",
    # fastapi floor aligned with starlette>=0.49.1: fastapi 0.100 pins an old
    # starlette (~0.27) and cannot satisfy the starlette floor below.
    "fastapi>=0.115.0",
    "starlette>=0.49.1",
    "itsdangerous>=2.0",
]

[project.optional-dependencies]
# Convenience extra for running the demo app / a real server.
server = ["uvicorn[standard]>=0.23.0"]

[project.urls]
Homepage = "https://github.com/jamescrowley321/py-identity-model"
Repository = "https://github.com/jamescrowley321/py-identity-model"
Issues = "https://github.com/jamescrowley321/py-identity-model/issues"

[tool.uv.sources]
py-identity-model = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["fastapi_identity_model"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

# ── Release automation (python-semantic-release) ──────────────────────
# Invoked from the REPO ROOT via
#   semantic-release -c packages/fastapi-identity-model/pyproject.toml version
# (release.yml, after the root release job) — all paths below are
# repo-root-relative. Only commits scoped "(fastapi)" drive this version;
# every other commit belongs to the root py-identity-model pipeline.
# See tools/release_parsers.py for the scope routing.
[tool.semantic_release]
commit_parser = "tools/release_parsers.py:FastapiCommitParser"
tag_format = "fastapi-identity-model-v{version}"
# 0.x package: a breaking change bumps the minor, not to 1.0.0 — the 1.0.0
# jump stays a deliberate, manual decision.
major_on_zero = false
allow_zero_version = true
version_toml = ["packages/fastapi-identity-model/pyproject.toml:project.version"]
commit_message = "chore(fastapi): release {version}\n\nAutomatically generated by python-semantic-release"

# Release only from main — no prerelease branch group, so a dispatch from any
# other branch refuses to version rather than minting an rc of the package.
[tool.semantic_release.branches.main]
match = "main"

# Update mode preserves the hand-written 0.1.0 notes; new releases are
# inserted at the marker in CHANGELOG.md.
[tool.semantic_release.changelog]
mode = "update"
insertion_flag = "<!-- psr: next release -->"

[tool.semantic_release.changelog.default_templates]
changelog_file = "packages/fastapi-identity-model/CHANGELOG.md"

[tool.semantic_release.commit_parser_options]
allowed_tags = ["build", "chore", "ci", "docs", "feat", "fix", "perf", "style", "refactor", "test"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]

[tool.semantic_release.remote]
name = "origin"
type = "github"
