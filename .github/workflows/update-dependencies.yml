name: Nightly Dependency Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Update dependencies
        run: uv lock --upgrade

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --exit-code uv.lock; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing automated dependency PR
        if: steps.check_changes.outputs.changed == 'true'
        id: check_existing_pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          EXISTING_PR=$(gh pr list --search "chore(deps): automated dependency update" --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING_PR" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Existing automated dependency PR found: #${EXISTING_PR}. Skipping."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for dependency updates
        if: steps.check_changes.outputs.changed == 'true' && steps.check_existing_pr.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DATE_SUFFIX=$(date +%Y%m%d)
          DATE_TITLE=$(date +%Y-%m-%d)
          BRANCH_NAME="chore/automated-dependency-update-${DATE_SUFFIX}"
          DIFF=$(git diff uv.lock)

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH_NAME}"
          git add uv.lock
          git commit -m "chore(deps): automated dependency update"
          git push origin "${BRANCH_NAME}"

          gh pr create \
            --title "chore(deps): automated dependency update ${DATE_TITLE}" \
            --body "$(cat <<EOF
          ## Automated Dependency Update

          This PR was automatically generated by the nightly dependency update workflow.

          All dependencies have been updated within their version constraints using \`uv lock --upgrade\`.

          ### Changes

          <details>
          <summary>uv.lock diff</summary>

          \`\`\`diff
          ${DIFF}
          \`\`\`

          </details>
          EOF
          )"
