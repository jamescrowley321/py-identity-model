name: Conformance

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Start conformance suite
        working-directory: conformance
        run: docker compose up -d --build --wait
        timeout-minutes: 10

      - name: Wait for conformance suite
        run: |
          echo "Waiting for conformance suite at https://localhost.emobix.co.uk:8443..."
          for i in $(seq 1 60); do
            HTTP_CODE=$(curl -sk -o /dev/null -w '%{http_code}' https://localhost.emobix.co.uk:8443/ || true)
            if [ "$HTTP_CODE" -ge 200 ] 2>/dev/null && [ "$HTTP_CODE" -lt 400 ] 2>/dev/null; then
              echo "Conformance suite is ready (HTTP $HTTP_CODE)"
              break
            fi
            if [ "$i" -eq 60 ]; then
              echo "Timed out waiting for conformance suite"
              docker compose -f conformance/docker-compose.yml logs server
              exit 1
            fi
            sleep 5
          done

      - name: Wait for RP harness
        run: |
          echo "Waiting for RP harness at http://localhost:8888/health..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8888/health > /dev/null 2>&1; then
              echo "RP harness is ready"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Timed out waiting for RP harness"
              docker compose -f conformance/docker-compose.yml logs rp
              exit 1
            fi
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install test runner dependencies
        run: pip install httpx

      - name: Run Basic RP conformance tests
        run: |
          python conformance/run_tests.py \
            --plan basic-rp \
            --output conformance/results/basic-rp-latest.json \
            --verbose

      - name: Run Config RP conformance tests
        # signing-key-rotation is a known pre-existing timeout — don't block other profiles
        continue-on-error: true
        run: |
          python conformance/run_tests.py \
            --plan config-rp \
            --output conformance/results/config-rp-latest.json \
            --verbose

      - name: Run Form Post Basic RP conformance tests
        run: |
          python conformance/run_tests.py \
            --plan form-post-basic-rp \
            --output conformance/results/form-post-basic-rp-latest.json \
            --verbose

      - name: Export HTML results and logs
        if: always()
        run: |
          mkdir -p conformance/results/logs

          # Export HTML results for each plan that produced results
          for RESULTS_FILE in conformance/results/*-latest.json; do
            [ -f "$RESULTS_FILE" ] || continue
            PLAN_NAME=$(basename "$RESULTS_FILE" -latest.json)
            PLAN_ID=$(python3 -c "
          import json, sys
          try:
              results = json.load(open(sys.argv[1]))
              plan_id = results.get('plan_id', '')
              if plan_id:
                  print(plan_id, end='')
              else:
                  sys.exit(1)
          except Exception:
              sys.exit(1)
          " "$RESULTS_FILE" 2>/dev/null) && \
            curl -sfk "https://localhost.emobix.co.uk:8443/api/plan/exporthtml/${PLAN_ID}" \
              -o "conformance/results/${PLAN_NAME}-report.zip" && \
            echo "HTML results exported for ${PLAN_NAME} plan ${PLAN_ID}" || \
            echo "Warning: could not export HTML results for ${PLAN_NAME} (suite may be down)"
          done

          # Download suite logs for debugging
          docker compose -f conformance/docker-compose.yml logs server > conformance/results/logs/server.log 2>&1 || true
          docker compose -f conformance/docker-compose.yml logs rp > conformance/results/logs/rp.log 2>&1 || true

      - name: Upload conformance results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: conformance-results
          path: |
            conformance/results/*-latest.json
            conformance/results/*-report.zip
            conformance/results/logs/
          retention-days: 30

      - name: Teardown
        if: always()
        working-directory: conformance
        run: docker compose down -v
