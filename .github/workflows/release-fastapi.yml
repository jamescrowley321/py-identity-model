# Publish pipeline for the `fastapi-identity-model` sub-package.
#
# A `fastapi-identity-model-v*` tag builds, tests, validates and PUBLISHES;
# a manual workflow_dispatch runs the same build/test/validate as a dry run but
# does NOT publish. The package version is owned by
# packages/fastapi-identity-model/pyproject.toml.
#
# Tags are normally cut automatically: the `release-fastapi-version` job in
# release.yml runs python-semantic-release with the package's config, which
# versions from `feat(fastapi)`/`fix(fastapi)` commits on main (scope routing:
# tools/release_parsers.py) and pushes the tag that triggers this workflow.
# A manually pushed `fastapi-identity-model-v<version>` tag works the same way
# (the tag/version-match guard below still applies).
#
# One-time owner setup: register a PyPI Trusted Publisher for the project
# `fastapi-identity-model` pointing at this repo + workflow `release-fastapi.yml`
# + environment `pypi`. No API token is stored (publishing uses OIDC).
name: Release fastapi-identity-model

on:
  workflow_dispatch:
  push:
    tags:
      - "fastapi-identity-model-v*"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read # restore checkout access (job perms replace, not extend)
      id-token: write # OIDC token for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Test fastapi-identity-model
        run: make test-fastapi

      - name: Build fastapi-identity-model
        run: uv build --package fastapi-identity-model --out-dir dist-fastapi

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="$(grep -m1 '^version' packages/fastapi-identity-model/pyproject.toml | cut -d'"' -f2)"
          tag="${GITHUB_REF_NAME#fastapi-identity-model-v}"
          if [ "$version" != "$tag" ]; then
            echo "::error::Tag '$tag' does not match package version '$version'"
            exit 1
          fi
          echo "Releasing fastapi-identity-model $version"

      - name: Check distribution metadata
        run: uvx twine check dist-fastapi/*

      # Publish only on a version tag. A workflow_dispatch run builds, tests and
      # validates but never publishes — so a dispatch from an arbitrary branch
      # cannot ship an unversioned/unchecked package.
      - name: Publish to PyPI (trusted publishing)
        if: startsWith(github.ref, 'refs/tags/')
        run: uv publish --trusted-publishing always dist-fastapi/*
