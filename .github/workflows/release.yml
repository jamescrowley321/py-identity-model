name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to release from'
        required: true
        default: 'main'
        type: string

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    with:
      ref: ${{ github.event.inputs.branch || github.ref_name }}
      run-descope-integration: true
      run-example-tests: true
      run-build: true
    secrets: inherit

  release:
    needs: ci
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Python 3.13
        uses: actions/setup-python@v7
        with:
          python-version: 3.13

      - name: Install dependencies
        run: make ci-setup

      - name: Determine branch name
        id: branch
        run: |
          BRANCH="${{ github.event.inputs.branch || github.ref_name }}"
          echo "name=$BRANCH" >> $GITHUB_OUTPUT
          if [[ "$BRANCH" == "main" ]]; then
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Semantic Version Release
        id: release
        uses: python-semantic-release/python-semantic-release@v10.6.1
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          git_committer_name: "github-actions"
          git_committer_email: "actions@users.noreply.github.com"

      - name: Sync uv.lock with released version
        if: steps.release.outputs.released == 'true'
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          uv lock
          if git diff --quiet uv.lock; then
            echo "uv.lock already up to date"
          else
            git add uv.lock
            git commit -m "chore: sync uv.lock with ${{ steps.release.outputs.version }}"
            git push
          fi

      - name: Build distribution
        if: steps.release.outputs.released == 'true'
        run: |
          echo "Building version ${{ steps.release.outputs.version }}"
          # Ensure version is set in pyproject.toml (semantic-release should have done this,
          # but we verify/set it explicitly to be safe)
          sed -i -e "s/0.0.0/${{ steps.release.outputs.version }}/" pyproject.toml
          make build-dist

      - name: Upload to GitHub Release Assets
        uses: python-semantic-release/publish-action@v10.6.1
        if: steps.release.outputs.released == 'true'
        with:
          github_token: ${{ secrets.RELEASE_TOKEN }}
          tag: ${{ steps.release.outputs.tag }}

      - name: Publish to PyPI
        if: steps.release.outputs.released == 'true'
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.pypi_token }}
        run: make upload-dist

      - name: Release Summary
        if: steps.release.outputs.released == 'true'
        run: |
          echo "## Release Published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ steps.release.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ steps.branch.outputs.name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.branch.outputs.is_prerelease }}" == "true" ]]; then
            echo "This is a **prerelease** version." >> $GITHUB_STEP_SUMMARY
          else
            echo "This is a **stable** release." >> $GITHUB_STEP_SUMMARY
          fi

      - name: No Release Needed
        if: steps.release.outputs.released != 'true'
        run: |
          echo "## No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No release was created. This can happen if:" >> $GITHUB_STEP_SUMMARY
          echo "- There are no releasable commits (commits must follow conventional commit format)" >> $GITHUB_STEP_SUMMARY
          echo "- The version would not change based on the commits" >> $GITHUB_STEP_SUMMARY

  # Version the fastapi-identity-model package from "(fastapi)"-scoped commits
  # (scope routing: tools/release_parsers.py; config: the package's
  # pyproject.toml). Runs AFTER the core release job so the two pipelines never
  # push to main concurrently. When it cuts a version, the PAT-pushed
  # fastapi-identity-model-v* tag triggers release-fastapi.yml, which builds
  # and publishes to PyPI via trusted publishing. Main-only: the package config
  # has no prerelease branch group, so other branches must not run it.
  release-fastapi-version:
    needs: release
    if: ${{ (github.event.inputs.branch || github.ref_name) == 'main' }}
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-release-fastapi-${{ github.ref_name }}
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Sync with commits pushed by the core release job
        run: git pull --ff-only origin main

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Version fastapi-identity-model
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          GIT_COMMIT_AUTHOR: "github-actions <actions@users.noreply.github.com>"
        run: |
          git config user.name "github-actions"
          git config user.email "actions@users.noreply.github.com"
          uvx --from python-semantic-release==10.6.1 semantic-release \
            -c packages/fastapi-identity-model/pyproject.toml version
